server.port=9090
spring.application.name=api-gateway-service

# Configuraci¾n de Eureka para el Gateway
eureka.client.serviceUrl.defaultZone=http://internal-bomberos-internal-alb-1797992975.us-east-1.elb.amazonaws.com:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.registry-fetch-interval-seconds=10

# --- RUTAS DIRECTAS Y CON /API ---
spring.cloud.gateway.routes[0].id=usuarios-service
spring.cloud.gateway.routes[0].uri=lb://MS-USUARIOS
spring.cloud.gateway.routes[0].predicates[0]=Path=/usuarios/**, /api/usuarios/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/(?<segment>.*), /$\\{segment}

spring.cloud.gateway.routes[1].id=reportes-service
spring.cloud.gateway.routes[1].uri=lb://MS-REPORTES
spring.cloud.gateway.routes[1].predicates[0]=Path=/reportes/**, /api/reportes/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /$\\{segment}

spring.cloud.gateway.routes[2].id=monitoreo-service
spring.cloud.gateway.routes[2].uri=lb://MS-MONITOREO
spring.cloud.gateway.routes[2].predicates[0]=Path=/monitoreo/**, /api/monitoreo/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/(?<segment>.*), /$\\{segment}

spring.cloud.gateway.routes[3].id=alertas-service
spring.cloud.gateway.routes[3].uri=lb://MS-ALERTAS
spring.cloud.gateway.routes[3].predicates[0]=Path=/alertas/**, /api/alertas/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/(?<segment>.*), /$\\{segment}

spring.cloud.gateway.routes[4].id=historial-service
spring.cloud.gateway.routes[4].uri=lb://MS-HISTORIAL
spring.cloud.gateway.routes[4].predicates[0]=Path=/historial/**, /api/historial/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/(?<segment>.*), /$\\{segment}

# --- CONFIGURACIėN CORS UNIFICADA ---
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000, http://bomberos-alb-155931198.us-east-1.elb.amazonaws.com
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true